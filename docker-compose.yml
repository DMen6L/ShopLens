version: "3.9"

# Infrastructure only — app runs locally via uv.
# docker compose up   →  starts PostgreSQL + Qdrant
# App:                   uv run uvicorn app:app --reload

services:
  db:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: shoplens
      POSTGRES_USER: shoplens
      POSTGRES_PASSWORD: shoplens
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoplens -d shoplens"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.9.2
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

volumes:
  pg_data:
  qdrant_data:
